# File: sqlc.yaml

version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/postgresdb/queries"
    schema: "internal/postgresdb/schema.sql"
    gen:
      go:
        package: "postgresdb"
        out: "internal/postgresdb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_interface: true
